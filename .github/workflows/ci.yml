name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

      - name: Run backend tests
        run: >
          docker compose run --rm
          -e APP_CONFIG=testing
          -e TEST_DATABASE_URL=postgresql://coproof:coproofpass@db:5432/coproof_db
          web python -m pytest tests/ -v

      - name: Tear down compose services
        if: always()
        run: docker compose down -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npx ng test --configuration=ci

      - name: Production build check
        run: npm run build -- --configuration=production
